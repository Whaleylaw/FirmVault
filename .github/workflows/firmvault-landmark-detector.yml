name: firmvault-landmark-detector

# Arch 1 (Pure GitHub-native) of the Track A bake-off.
#
# Fires when a PR on a task/* branch is merged into the working branch.
# Re-evaluates the task's success_check against the post-merge vault
# and, if satisfied, closes the corresponding task issue with
# status:done. Purely reactive — never writes to the vault, never
# reopens anything.

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to re-evaluate manually"
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: firmvault-landmark-detector-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  detect:
    # Only fire on merged PRs from task/* branches (not closed-without-merge,
    # not PRs from other branches). Also allow manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'task/'))
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

    steps:
      - name: Checkout post-merge vault state
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Guard — refuse to run without OPENROUTER_API_KEY
        run: |
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "::error::OPENROUTER_API_KEY is not set. Add it as a repo secret."
            exit 1
          fi

      - name: Run landmark detector
        run: |
          set -euo pipefail
          if [ ! -f .github/workflows/prompts/landmark-detector.md ]; then
            echo "::error::prompt file missing"
            exit 1
          fi

          {
            echo "## PR context"
            echo "PR number: $PR_NUMBER"
            echo "Repository: $GITHUB_REPOSITORY"
            echo ""
            echo "---"
            echo ""
            cat .github/workflows/prompts/landmark-detector.md
          } > /tmp/lmd-prompt.md

          claude --print \
            --model openrouter/anthropic/claude-sonnet-4-6 \
            --dangerously-skip-permissions \
            --allowedTools "Bash,Read,Grep,Glob" \
            "$(cat /tmp/lmd-prompt.md)"
