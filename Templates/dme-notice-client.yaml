id: dme_notice_client
name: Notice of DME to Client
description: Letter notifying client of scheduled Independent Medical Examination
  (Defense Medical Exam)
category: litigation
input_mode: graph
output_filename: DME_Notice_{client_name}_{date}.pdf
graph_inputs:
- name: case_name
  required: true
fields:
- name: today_date
  source: computed
- name: client_name
  source: graph
  graph_query: 'MATCH (c:Case {name: $case_name})-[:HAS_CLIENT]->(client:Client)

    RETURN client.name'
  required: true
- name: client_first_name
  source: graph
  graph_query: 'MATCH (c:Case {name: $case_name})-[:HAS_CLIENT]->(client:Client)

    RETURN CASE WHEN client.name CONTAINS '' '' THEN split(client.name, '' '')[0]
    ELSE client.name END'
  required: true
- name: client_address_block
  source: graph
  graph_query: 'MATCH (c:Case {name: $case_name})-[:HAS_CLIENT]->(client:Client)

    RETURN coalesce(client.address_line1, '''') + ''\n'' + coalesce(client.city, '''')
    + '', '' + coalesce(client.state, '''') + '' '' + coalesce(client.zip, '''')'
  required: false
- name: dme_date
  source: input
  description: Date of DME/IME (e.g., 'January 15, 2026')
  required: true
- name: dme_time
  source: input
  description: Time of DME/IME (e.g., '2:00 PM EST')
  required: true
