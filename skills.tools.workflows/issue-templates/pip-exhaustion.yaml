template_id: pip-exhaustion
name: PIP Benefits Exhausted
description: >
  Use when PIP benefits are exhausted or approaching exhaustion ($10,000 KY PIP limit).
  PIP activity appeared in 76% of all cases (174 of 230 archived). When PIP exhausts,
  providers who previously billed PIP directly begin contacting the firm about
  outstanding balances, requesting PIP logs, and asking whether to hold balances "till
  settlement." This creates urgency for demand preparation and generates client anxiety
  about bills going to collections.
default_priority: high
default_due_offset: 7d
typical_phases: [phase_2_treatment, phase_3_demand]
wiki_sources:
  - pip-claims-management
  - pip-exhaustion-triggers-provider-billing-pressure
  - medical-bill-collections-anxiety
  - demand-preparation-workflow
checklist:
  - "Confirm PIP exhaustion by requesting updated PIP ledger from carrier"
  - "Send PIP exhaust letter to all providers using standardized template"
  - "Use the PIP exhaustion moment to simultaneously request outstanding records/bills from each provider"
  - "Track which providers have been notified of exhaustion"
  - "When providers ask 'is more PIP available or no funds till settlement' — respond within 48 hours"
  - "If PIP is NOT exhausted but provider inquires, redirect billing to PIP carrier with updated claim info"
  - "Proactively warn client that medical bills may go to collections and that this is normal during a PI case"
  - "If client reports collection notices: respond within 24 hours with bill status and expected timeline"
  - "Consider contacting collection agencies with LOR and documentation of PIP processing"
  - "Factor unpaid provider balances into demand as lien-like obligations"
  - "Escalate demand preparation urgency — PIP exhaustion signals the case needs to move forward"
  - "For cases with PIP and health insurance interaction: verify deductible application before submitting remainder"
  - "Monitor whether PIP paid amounts match what records show — adjusters will exploit discrepancies"
escalation_trigger: 14d
blocks_landmark: null
tags: [pip, exhaustion, provider-billing, collections, demand-urgency]
